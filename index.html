
<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Resistance: Avalon - Persian Edition</title>
    <!-- Vazirmatn for Persian Body Text -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css">
    <!-- Lalezar for Persian Titles -->
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      body {
        font-family: 'Vazirmatn', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overscroll-behavior: none;
        background-color: #020617;
        background-image: url('/images/Avalon.png');
        background-size: cover;
        background-position: center center;
        background-attachment: fixed;
      }
      .font-lalezar {
        font-family: 'Lalezar', cursive;
      }
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(10, 5, 20, 0.75);
        z-index: -1;
      }
      .tap-highlight-transparent {
        -webkit-tap-highlight-color: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(234, 179, 8, 0.2);
        border-radius: 10px;
      }
      .animate-fade-in {
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      /* iPhone 16 Pro specific safe area paddings */
      .safe-top { padding-top: var(--sat); }
      .safe-bottom { padding-bottom: var(--sab); }
      .safe-p { padding: var(--sat) var(--sar) var(--sab) var(--sal); }

      /* Staggered animation for lists */
      .animate-stagger-in > * {
        animation: fadeIn 0.4s ease-out both;
      }
      .animate-stagger-in > *:nth-child(1) { animation-delay: 0.05s; }
      .animate-stagger-in > *:nth-child(2) { animation-delay: 0.1s; }
      .animate-stagger-in > *:nth-child(3) { animation-delay: 0.15s; }
      .animate-stagger-in > *:nth-child(4) { animation-delay: 0.2s; }
      .animate-stagger-in > *:nth-child(5) { animation-delay: 0.25s; }

      /* Subtle noise texture overlay for depth */
      body::after {
        content: '';
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.4;
      }

      /* Glow button effect */
      .glow-amber {
        box-shadow: 0 0 20px rgba(245, 158, 11, 0.25), 0 4px 15px rgba(0,0,0,0.4);
      }

      /* Smooth scale for interactive elements */
      .press-scale {
        transition: transform 0.15s ease;
      }
      .press-scale:active {
        transform: scale(0.96);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="text-gray-100 antialiased overflow-hidden h-screen select-none">
    <div id="root" class="h-full"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
